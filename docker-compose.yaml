services:
  app:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    restart: on-failure
    command: >
      sh -c "npm run start:dev"

  client:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: on-failure


  web:
    image: nginx:alpine
    env_file:
      - .env
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - client
    restart: on-failure

