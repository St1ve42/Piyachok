services:
  app:
    build:
      context: .
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "80:3001"
    restart: on-failure
    command: >
      sh -c "npm run start:dev"

  web:
    image: nginx:alpine
    env_file:
      - .env
    volumes:
      - ./client:/usr/share/nginx
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    restart: on-failure
